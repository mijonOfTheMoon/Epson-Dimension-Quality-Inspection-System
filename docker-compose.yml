services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    image: diminspect-backend:latest
    container_name: diminspect-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4000
      LOG_LEVEL: info
      CORS_ORIGIN: "*"
      STORAGE_DRIVER: json
      DATA_FILE: /app/data/diminspect.json
      MQTT_ENABLED: "false"
      MQTT_URL: mqtt://host.docker.internal:1883
      MQTT_CLIENT_ID: diminspect-backend
      MQTT_TOPIC_PREFIX: diminspect
      MQTT_QOS: 1
      EVENT_REPLAY_LIMIT: 100
    ports:
      - "4000:4000"
    volumes:
      - backend-data:/app/data

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:4000
        VITE_WS_URL: ws://localhost:4000/ws
    image: diminspect-frontend:latest
    container_name: diminspect-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  backend-data:
