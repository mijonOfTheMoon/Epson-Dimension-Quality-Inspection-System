services:
  postgres:
    image: postgres:17-alpine
    container_name: diminspect-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: diminspect
      POSTGRES_USER: diminspect
      POSTGRES_PASSWORD: diminspect
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diminspect -d diminspect"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    image: diminspect-backend:latest
    container_name: diminspect-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4000
      LOG_LEVEL: info
      CORS_ORIGIN: "*"
      STORAGE_DRIVER: postgres
      DATABASE_URL: postgresql://diminspect:diminspect@postgres:5432/diminspect
      DATABASE_SSL: "false"
      DATABASE_POOL_MAX: 10
      MQTT_ENABLED: "false"
      MQTT_URL: mqtt://host.docker.internal:1883
      MQTT_CLIENT_ID: diminspect-backend
      MQTT_TOPIC_PREFIX: diminspect
      MQTT_QOS: 1
      EVENT_REPLAY_LIMIT: 100
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:4000
        VITE_WS_URL: ws://localhost:4000/ws
    image: diminspect-frontend:latest
    container_name: diminspect-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  postgres-data:
