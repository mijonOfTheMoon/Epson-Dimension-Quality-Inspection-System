services:
  postgres:
    image: postgres:17-alpine
    container_name: diminspect-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: diminspect
      POSTGRES_USER: diminspect
      POSTGRES_PASSWORD: diminspect
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diminspect -d diminspect"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    image: diminspect-backend:latest
    container_name: diminspect-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4000
      LOG_LEVEL: info
      CORS_ORIGIN: "http://localhost"
      DATABASE_URL: postgresql://diminspect:diminspect@postgres:5432/diminspect
      DATABASE_SSL: "false"
      DATABASE_POOL_MAX: 10
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production-please-use-long-secret}"
      JWT_EXPIRES_IN: "7d"
      BCRYPT_ROUNDS: 10
      AGENT_TOKEN: "${AGENT_TOKEN:-change-me-agent-shared-token}"
      EVENT_REPLAY_LIMIT: 100
    expose:
      - "4000"

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_WS_URL: /ws
    image: diminspect-frontend:latest
    container_name: diminspect-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "8080"

  proxy:
    image: nginx:1.28-alpine
    container_name: diminspect-proxy
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./Proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres-data:
